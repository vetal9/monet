<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monet Finance</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --accent-green: #32d74b;
            --accent-red: #ff453a;
            --accent-blue: #007aff;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            opacity: 0; /* Для анимации появления */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .balance-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 25px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            text-align: center;
        }

        .balance-amount {
            font-size: 40px;
            font-weight: 800;
            margin: 10px 0;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-income { background: var(--accent-green); color: black; }
        .btn-expense { background: var(--card-bg); color: white; border: 1px solid var(--border-color); }

        .list-title { font-size: 18px; margin-bottom: 15px; }

        .transaction {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .income-text { color: var(--accent-green); }
        .expense-text { color: var(--accent-red); }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <header>
            <h1>Monet</h1>
            <div style="font-weight: bold; color: var(--accent-blue);">V.9</div>
        </header>

        <div class="balance-card" id="card">
            <div style="color: var(--text-secondary); font-size: 14px;">МОЙ БАЛАНС</div>
            <div class="balance-amount" id="balanceText">$12,850.00</div>
        </div>

        <div class="actions">
            <button class="btn btn-income" onclick="addTx('income')">+ Доход</button>
            <button class="btn btn-expense" onclick="addTx('expense')">- Расход</button>
        </div>

        <div class="list-title">Последние операции</div>
        <div id="txList"></div>
    </div>

    <script>
        let balance = 12850;

        // Появление приложения
        window.onload = () => {
            gsap.to("#app", { opacity: 1, duration: 0.5 });
            gsap.from("#card", { y: 30, opacity: 0, duration: 0.8, ease: "back.out" });
        };

        function updateBalance() {
            document.getElementById('balanceText').innerText = `$${balance.toLocaleString()}`;
        }

        function addTx(type) {
            const amount = type === 'income' ? 500 : 150;
            balance += (type === 'income' ? amount : -amount);
            updateBalance();

            const list = document.getElementById('txList');
            const item = document.createElement('div');
            item.className = 'transaction';
            
            const colorClass = type === 'income' ? 'income-text' : 'expense-text';
            const sign = type === 'income' ? '+' : '-';

            item.innerHTML = `
                <span>${type === 'income' ? '💰 Доход' : '🛒 Расход'}</span>
                <span class="${colorClass}">${sign}$${amount}</span>
            `;

            list.prepend(item);

            // Анимация новой строки
            gsap.from(item, { x: -20, opacity: 0, duration: 0.4, ease: "power2.out" });
        }
    </script>
</body>
</html>
