<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Monet Finance Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --accent-green: #32d74b;
            --accent-red: #ff453a;
            --accent-blue: #007aff;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(20px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            /* Защита для iOS safe areas (челка и нижний бар) */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0; /* Изначально скрыто для анимации появления */
        }

        /* Премиальный заголовок */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 10px 0;
        }

        header h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
        }

        .profile-icon {
            width: 40px;
            height: 40px;
            background-color: var(--card-bg);
            border-radius: 50%;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--accent-blue);
        }

        /* Главная карточка Баланса (Glassmorphism) */
        .balance-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(0, 122, 255, 0.05) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
        }

        .balance-label {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 25px;
        }

        .balance-stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            flex: 1;
            background: rgba(255,255,255, 0.02);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .stat-income { color: var(--accent-green); }
        .stat-expense { color: var(--accent-red); }

        /* Кнопки действий */
        .actions-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .action-btn {
            flex: 1;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:active {
            background-color: rgba(255,255,255, 0.08);
        }

        .action-btn.primary {
            background-color: var(--accent-blue);
            border: none;
        }
        
        .action-btn.primary:active {
            background-color: #006adb;
        }

        /* Список транзакций */
        .transactions-section h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .transaction-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 18px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Изначально скрыто для анимации добавления */
            opacity: 0;
            transform: translateY(20px);
        }

        .tx-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tx-icon {
            width: 44px;
            height: 44px;
            background-color: rgba(255,255,255,0.03);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .tx-details {
            display: flex;
            flex-direction: column;
        }

        .tx-category {
            font-size: 16px;
            font-weight: 600;
        }

        .tx-date {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .tx-amount {
            font-size: 17px;
            font-weight: 700;
        }

        /* Утилиты */
        .hidden { display: none !important; }

    </style>
</head>
<body>

    <div class="app-container" id="app">
        <header>
            <h1>Monet</h1>
            <div class="profile-icon">V9</div>
        </header>

        <div class="balance-card" id="balanceCard">
            <div class="balance-label">Текущий баланс</div>
            <div class="balance-amount" id="totalBalance">$12,850.00</div>
            
            <div class="balance-stats">
                <div class="stat-item">
                    <div class="stat-label">Доход (мес.)</div>
                    <div class="stat-value stat-income">+$3,200</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Расход (мес.)</div>
                    <div class="stat-value stat-expense">-$1,150</div>
                </div>
            }
            </div>
        </div>

        <div class="actions-grid" id="actionsGrid">
            <button class="action-btn primary" onclick="animateClick(this); addTransaction('income')">
                <i>+</i> Доход
            </button>
            <button class="action-btn" onclick="animateClick(this); addTransaction('expense')">
                <i>−</i> Расход
            </button>
        </div>

        <div class="transactions-section" id="transactionsSection">
            <h2>Последние операции</h2>
            <div class="transaction-list" id="transactionList">
                }
            </div>
        </div>
    </div>

    <script>
        // --- Логика Данных (База) ---
        let balance = 12850;
        const transactions = [
            { type: 'expense', category: 'Продукты', date: 'Сегодня, 14:20', amount: 85, icon: '🛒' },
            { type: 'income', category: 'Зарплата', date: 'Вчера, 10:00', amount: 3200, icon: '💰' },
            { type: 'expense', category: 'Транспорт', date: 'Вчера, 18:15', amount: 45, icon: '🚗' }
        ];

        // Инициализация
        window.addEventListener('load', () => {
            renderBalance();
            renderTransactions();
            animateAppEntrance(); // Запуск анимации появления
        });

        function renderBalance() {
            document.getElementById('totalBalance').innerText = `$${balance.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
        }

        function renderTransactions() {
            const list = document.getElementById('transactionList');
            list.innerHTML = '';
            transactions.forEach(tx => renderSingleTransaction(tx, false));
        }

        function renderSingleTransaction(tx, animateIn = true) {
            const list = document.getElementById('transactionList');
            const item = document.createElement('div');
            item.className = 'transaction-item';
            
            const amountClass = tx.type === 'income' ? 'stat-income' : 'stat-expense';
            const amountSign = tx.type === 'income' ? '+' : '-';

            item.innerHTML = `
                <div class="tx-info">
                    <div class="tx-icon">${tx.icon}</div>
                    <div class="tx-details">
                        <span class="tx-category">${tx.category}</span>
                        <span class="tx-date">${tx.date}</span>
                    </div>
                </div>
                <div class="tx-amount ${amountClass}">${amountSign}$${tx.amount.toLocaleString()}</div>
            `;

            if (animateIn) {
                list.prepend(item); // Добавляем в начало списка
                animateNewTransaction(item); // Анимируем появление новой строки
            } else {
                list.appendChild(item);
                // Для начальной загрузки делаем их видимыми сразу (но GSAP анимирует весь список)
                gsap.set(item, {opacity: 1, translateY: 0});
            }
        }

        // Временная функция добавления (для теста анимации)
        function addTransaction(type) {
            const newTx = {
                type: type,
                category: type === 'income' ? 'Новый доход' : 'Новый расход',
                date: 'Только что',
                amount: type === 'income' ? 500 : 150,
                icon: type === 'income' ? '💵' : '💸'
            };
            
            balance += (type === 'income' ? newTx.amount : -newTx.amount);
            renderBalance();
            renderSingleTransaction(newTx, true);
        }


        // ==========================================
        // === БЛОК АНИМАЦИЙ (GSAP) ===
        // ==========================================

        // 1. Анимация входа приложения (Stagger effect)
        function animateAppEntrance() {
            const tl = gsap.timeline({ defaults: { ease: "power3.out" }});

            tl.to("#app", { opacity: 1, duration: 0.1 }) // Сначала показываем контейнер
              .from("header", { y: -30, opacity: 0, duration: 0.8 }, 0)
              .from("#balanceCard", { y: 50, opacity: 0, duration: 1, ease: "back.out(1.7)" }, 0.2)
              .from("#actionsGrid button", { y: 30, opacity: 0, duration: 0.8, stagger: 0.1 }, 0.4)
              .from("#transactionsSection h2", { opacity: 0, duration: 0.6 }, 0.6)
              // Анимируем появление начальных транзакций по очереди
              .to(".transaction-item", { opacity: 1, y: 0, duration: 0.6, stagger: 0.1 }, 0.7);
        }

        // 2. Анимация тактильного отклика при клике на кнопку
        function animateClick(element) {
            gsap.to(element, { 
                scale: 0.95, 
                duration: 0.1, 
                yoyo: true, // Анимация идет туда и обратно
                repeat: 1, 
                ease: "power2.inOut" 
            });
        }

        // 3. Анимация добавления новой тран
